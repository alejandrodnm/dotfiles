# Ghostty config — ported from ~/dev/adn/dotfiles/kitty.conf
# Symlinked to ~/.config/ghostty/config

# Fonts
font-size = 18
font-family = FiraCode Nerd Font Mono
font-style = SemiBold
font-family-italic = Cascadia Code
font-style-italic = Bold Italic
font-family-bold-italic = Cascadia Code
font-style-bold-italic = Bold Italic
font-feature = calt, liga, ss01

# Window (macos_hide_titlebar, window_padding_width, macos_option_as_alt)
macos-titlebar-style = hidden
window-padding-x = 2
window-padding-y = 2
macos-option-as-alt = true

# Shell (kitty: shell /opt/homebrew/bin/zsh --login)
command = /opt/homebrew/bin/zsh --login

# Palette ported from kitty.conf
foreground = ebf6fc
background = 263238
palette = 0=#252525
palette = 1=#ff5252
palette = 2=#c3d82c
palette = 3=#ffc135
palette = 4=#42a5f5
palette = 5=#d81b60
palette = 6=#5ee9ca
palette = 7=#f5f5f5
palette = 8=#708284
palette = 9=#ff5252
palette = 10=#c3d82c
palette = 11=#ffc135
palette = 12=#42a5f5
palette = 13=#d81b60
palette = 14=#5ee9ca
palette = 15=#f5f5f5
